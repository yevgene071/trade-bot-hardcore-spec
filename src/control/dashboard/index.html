<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trade Bot HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<!-- include: html/kill-switch-banner.html -->
<!-- include: html/toast-container.html -->

<!-- include: html/header.html -->

<!-- include: html/tab-bar.html -->

<!-- include: html/tabs/command.html -->

<!-- include: html/tabs/trading.html -->

<!-- include: html/tabs/positions.html -->

<!-- include: html/tabs/signals.html -->

<!-- include: html/tabs/universe.html -->

<!-- include: html/tabs/journal.html -->

<!-- include: html/tabs/controls.html -->

<script src="js/main.js"></script>

<script>
'use strict';

// ── Tab switching ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    $('tab-' + tab).classList.add('active');
    if (tab === 'trading') {
      setTimeout(() => {
        initChartZoom();
        if (_state) renderTrading(_state, true);
      }, 50);
    }
  });
});

// ═══════════ API ═══════════
function selectTicker(t) {
  setSelTicker(t);
  setSelTickerTime(Date.now());
  setChartZoom(null);
  updateZoomIndicator();
  fetch('/api/ticker/select', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ticker: t })
  }).then(r => r.json()).then(j => {
    if (j.ok && _state) renderTrading(_state, true);
  });
}

function sendCommand(cmd, args = {}) {
  fetch('/api/command', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ command: cmd, args })
  }).then(r => r.json()).then(j => {
    if (j.ok) toast('Command Sent', cmd + ' ok', 'pos');
    else toast('Command Failed', j.error || 'Error', 'neg');
  }).catch(() => toast('Command Error', 'Network error', 'neg'));
}

// ═══════════ RECORDER ═══════════
function startRecorder() {
  const fn = ($('rec-filename').value || 'dump').replace(/[^a-zA-Z0-9\-_.]/g, '');
  fetch('/api/dump/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename: fn }) })
    .then(r => r.json()).then(j => { if (j.ok) { $('rec-status').textContent = '● RECORDING'; $('rec-status').className = 'val-dn'; $('rec-start-btn').disabled = true; $('rec-stop-btn').disabled = false; } else toast('Recorder Error', j.error || 'Failed', 'neg'); })
    .catch(() => toast('Recorder Error', 'Network error', 'neg'));
}
function stopRecorder() {
  fetch('/api/dump/stop', { method: 'POST' }).then(r => r.json()).then(() => { $('rec-status').textContent = 'Idle'; $('rec-status').className = ''; $('rec-start-btn').disabled = false; $('rec-stop-btn').disabled = true; }).catch(() => { });
}

// ═══════════ CSV ═══════════
function exportCSV() {
  if (!_state || !_state.recent_journal || !_state.recent_journal.length) return;
  let csv = 'Ticker,Side,Strategy,Entry Price,Exit Price,PnL USD,Exit Reason\n';
  _state.recent_journal.forEach(e => { csv += `${e.plan.ticker},${e.plan.side === 1 ? 'LONG' : 'SHORT'},${e.plan.strategy_name},${e.plan.entry_price},${e.exit_price},${e.pnl_usd},${e.cause_of_exit || ''}\n`; });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `journal_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

// ═══════════ MAIN LOOP ═══════════
function poll() {
  fetch('/api/state').then(r => r.json()).then(data => {
    setState(data);
    
    // Panels
    renderHeader(data);
    renderCommand(data);
    renderRisk(data);
    renderStrategyPerf(data);
    renderFunding(data);
    
    renderHeatmap(data);
    renderDetail(data);
    renderConditions(data);
    renderTrading(data);
    renderPositions(data);
    renderSignals(data);
    renderUniverse(data);
    renderJournal(data);

    // Charts
    renderEquityChart(data);

    // Kill-switch banner
    const ks = $('kill-switch-banner');
    if (ks) ks.style.display = data.kill_switch_active ? 'block' : 'none';

  }).catch(err => {
    console.error('Poll error:', err);
  });
}

setInterval(poll, 1000);
poll();

// Handle resize
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  setResizeTimer(setTimeout(() => { if (_state) renderTrading(_state, true); }, 100));
});
</script>
</body>
</html>
