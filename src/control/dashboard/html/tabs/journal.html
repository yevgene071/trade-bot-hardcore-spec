<!-- JOURNAL TAB -->
<div class="tab-content" id="tab-journal">
  <div class="scrollable">
    <div style="display:flex;gap:8px;margin-bottom:4px;">
      <select id="jrn-strat-filter" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px;"><option value="">All strategies</option></select>
      <button class="ctrl-btn success" onclick="exportCSV()" style="font-size:10px;padding:2px 8px;">&#x2913; CSV</button>
    </div>
    <div class="chart-container md" id="jrn-pnl-chart" style="margin-bottom:8px;"></div>
    <div class="card" style="flex:1;">
      <div class="card-head"><h3>Trade Journal</h3><span id="jrn-count" style="font-size:11px;color:var(--subtle);">0</span></div>
      <div class="card-body" style="padding:0;">
        <table><thead><tr><th>Time</th><th>Ticker</th><th>Side</th><th>Strategy</th><th>PnL</th><th>Exit Price</th><th>Reason</th></tr></thead><tbody id="jrn-body"></tbody></table>
      </div>
    </div>
  </div>
</div>
