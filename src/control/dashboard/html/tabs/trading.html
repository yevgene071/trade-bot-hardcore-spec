<!-- TRADING TAB (merged Charts + Order Book) -->
<div class="tab-content" id="tab-trading">
  <div class="trade-grid" style="height:100%;padding:8px;">
    <!-- Left: DOM Ladder -->
    <div class="ladder-panel">
      <div class="ladder-head">
        <div class="ladder-tickers" id="trade-tickers"></div>
        <div class="ladder-kpis">
          <div class="ladder-kpi"><div class="ladder-kpi-l">Spread</div><div class="ladder-kpi-v" id="trade-spread-val">—</div></div>
          <div class="ladder-kpi"><div class="ladder-kpi-l">Ticks</div><div class="ladder-kpi-v" id="trade-sticks-val">—</div></div>
          <div class="ladder-kpi"><div class="ladder-kpi-l">Imb</div><div class="ladder-kpi-v" id="trade-imb-val">—</div></div>
        </div>
      </div>
      <div class="ladder-wrap" id="trade-ladder-wrap">
        <div id="trade-mid-line"></div>
        <div id="trade-mid-tag"></div>
        <div id="trade-ladder"></div>
      </div>
    </div>

    <!-- Right: Charts -->
    <div class="chart-panel">
      <div class="chart-panel-head">
        <span class="c-pill" id="trade-chart-name">BTC_USDT</span>
        <div style="display:flex;gap:3px;" id="trade-tf-buttons">
          <button class="tf-btn" data-tf="30">30s</button>
          <button class="tf-btn active" data-tf="300">5m</button>
          <button class="tf-btn" data-tf="900">15m</button>
          <button class="tf-btn" data-tf="3600">1h</button>
          <input class="ctrl-input" id="tf-custom" type="number" min="10" max="300" placeholder="N" title="Custom bars (10-300)" style="width:36px;font-size:9px;padding:1px 4px;">
        </div>
        <span class="c-price" id="trade-chart-last">—</span>
        <span class="c-pct up" id="trade-chart-pct">—</span>
        <span id="zoom-indicator" style="display:none;font-size:10px;color:var(--accent2);margin-left:8px;cursor:pointer;" title="Double-click chart to reset zoom">&#x1F50D; Zoomed <span id="zoom-range"></span> &#x2716;</span>
      </div>
      <div class="chart-panel-body" id="trade-chart-body" style="position:relative;">
        <canvas id="trade-chart" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
        <div id="zoom-overlay" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;cursor:crosshair;z-index:10;">
          <div id="zoom-select" style="position:absolute;top:0;bottom:0;background:rgba(99,102,241,0.15);border-left:1px solid var(--accent);border-right:1px solid var(--accent);display:none;"></div>
        </div>
      </div>
    </div>

    <!-- Mini charts row -->
    <div class="minis-row" style="grid-column:2;">
      <div class="card" style="background:var(--surface-glass);"><div class="card-head" style="padding:3px 8px;"><h3 style="font-size:9px;">Spread</h3></div><div class="card-body" style="padding:4px;">          <canvas class="chart-container sm" id="trade-mini-spread" style="height:50px;"></canvas></div></div>
      <div class="card" style="background:var(--surface-glass);"><div class="card-head" style="padding:3px 8px;"><h3 style="font-size:9px;">Vol</h3></div><div class="card-body" style="padding:4px;">          <canvas class="chart-container sm" id="trade-mini-vol" style="height:50px;"></canvas></div></div>
      <div class="card" style="background:var(--surface-glass);"><div class="card-head" style="padding:3px 8px;"><h3 style="font-size:9px;">Aggr</h3></div><div class="card-body" style="padding:4px;">          <canvas class="chart-container sm" id="trade-mini-agg" style="height:50px;"></canvas></div></div>
      <div class="card" style="background:var(--surface-glass);"><div class="card-head" style="padding:3px 8px;"><h3 style="font-size:9px;">Corr</h3></div><div class="card-body" style="padding:4px;">          <canvas class="chart-container sm" id="trade-mini-corr" style="height:50px;"></canvas></div></div>
    </div>
  </div>
</div>
