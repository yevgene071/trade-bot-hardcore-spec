<header>
  <div class="brand">
    <div class="brand-icon"></div>
    <span class="brand-text">TRADE BOT</span>
    <span class="brand-sub" id="v-tag">v0.0.1</span>
  </div>
  <div class="header-center">
    <div id="pnl-badge" class="pnl-badge up">$0.00</div>
    <div class="uptime" id="uptime">00:00:00</div>
  </div>
  <div class="header-right">
    <div class="status-item">
      <div id="rec-dot" class="rec-dot" title="Dump recorder"></div>
      <span id="rec-label" style="font-size:10px;color:var(--muted);">REC</span>
    </div>
    <div class="status-item"><span>MS</span><div id="ms-dot" class="dot"></div><span id="ms-label" class="mono">OFF</span></div>
    <div class="status-item"><span>WS</span><div id="ws-dot" class="dot"></div><span id="ws-label" class="mono">OFF</span></div>
    <div id="clock" class="mono" style="color:var(--text);font-weight:700;font-size:11px;"></div>
  </div>
</header>
