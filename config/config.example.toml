# Trade Bot Configuration Example
# This file contains all configuration parameters with their defaults as described in:
# - spec/SIGNAL_DETECTION.md
# - spec/STRATEGIES.md
# - spec/RISK_MANAGEMENT.md

[app]
version = "0.0.1"
name = "trade_bot_hardcore"

[logger]
level = "info" # trace, debug, info, warn, error, critical
path = "logs/trade_bot.log"

[network]
http_timeout_ms = 5000
ws_reconnect_delay_ms = 1000
ws_max_reconnect_delay_ms = 30000
metascalp_max_rps = 20

[trading]
# Current simple-symbol examples use underscore aliases that transport converts
# to MetaScalp ticker names at the API boundary. Do not use this as a spot/perp
# identity model: when both spot and futures are used, configure explicit
# connection/market/ticker mapping from the MetaScalp ticker catalog.
symbols = ["BTC_USDT", "ETH_USDT", "SOL_USDT"]
max_concurrent_orders = 5

[feed]
depth_levels = 50
depth_percent = 0.5
# true  = MetaScalp sends initial snapshot on orderbook_subscribe.
# false = bot seeds via REST orderbook-snapshot and sends FetchSnapshot=false.
fetch_snapshot_on_subscribe = true

[risk]
# R2: Daily limit (morj)
max_daily_loss_pct = 3.0
# R8: sizing
max_per_trade_risk_pct = 0.5
# R14: hard kill
max_single_position_loss_pct = 1.5
# R15: slippage control
max_entry_slippage_bps = 5
# R8: clip on volume
max_position_value_pct = 10.0
# R3: parallel trades
max_concurrent_positions = 3
# R9: leverage
max_leverage = 5.0
margin_safety_ratio = 0.8
# R6: Stop validation
min_stop_bps = 3
warn_stop_bps = 15
max_stop_bps = 20
# R7: TP validation
min_rr_ratio = 1.0
min_tp2_rr = 2.0
# R10: anti-tilt
max_trades_per_window = 6
trades_window_min = 5
# R11: loss-streak
max_consecutive_losses = 3
loss_streak_window_min = 15
loss_streak_cooloff_min = 10
# R12: news blackout
news_blackout_min = 5
news_calendar_check_min = 60
news_calendar_require_fresh = false
# R13: funding blackout
funding_blackout_pre_sec = 30
funding_blackout_post_sec = 30
# Other
allow_hedge = false
whitelist_tickers = []
exchange_error_streak = 5
ws_reconnect_timeout_sec = 15
ws_loss_poll_interval_ms = 500
position_drift_coin = 0.0001
kill_switch_close_positions = true
kill_switch_close_timeout_sec = 30
kill_switch_step_timeout_sec = 5
kill_switch_total_timeout_sec = 45
max_parallel_cancel = 5
ws_loss_soft_stop_bps = 25
connection_health_poll_sec = 30
finres_staleness_sec = 60
finres_staleness_kill_sec = 300
finres_kill_on_staleness = false

[clock]
sources = ["pool.ntp.org", "time.google.com"]
check_interval_sec = 30
warn_drift_ms = 200
max_clock_drift_ms = 500

[perf]
hot_path_cpu = 2           # CPU id for processor_thread (event-driven pipeline)
ws_thread_cpu = 1          # CPU id for WebSocket I/O thread
rest_thread_cpu = 3        # CPU id for REST API thread
feature_rate_hz = 20.0     # Event-driven feature extraction rate cap (Hz)
spsc_queue_capacity = 65536  # Lock-free queue capacity (WS → processor)


[external_feeds]
[external_feeds.funding]
staleness_warn_sec = 120
staleness_kill_sec = 900
kill_on_staleness = false

[signals]
[signals.density]
min_size_vs_avg = 10.0
min_size_usd = 50000.0
min_distance_bps = 5
max_distance_bps = 150
sticky_duration_ms = 2000
fake_threshold_ms = 300
sticky_min_trade_ms = 5000
eating_window_ms = 3000
eating_ratio_threshold = 0.5
eating_min_prints = 5
eating_cooloff_ms = 1000

[signals.iceberg]
evidence_count_min = 3
evidence_window_sec = 30
iceberg_min_size_usd = 100000.0
size_retention_ratio = 0.5
iceberg_posterior_threshold = 0.8
event_join_window_ms = 100

[signals.tape]
burst_ratio = 3.0
burst_min_volume_usd = 50000.0
burst_min_rate = 5.0
fade_ratio = 0.2
fade_min_peak_rate = 10.0
fade_max_delay = 30.0
fade_cusum_h = 5.0
flush_min_size_usd = 200000.0
flush_min_move_bps = 15
back_window_sec = 10
distribution_max_range_bps = 20
distribution_min_volume_usd = 500000.0
distribution_min_spread_bps = 2.0

[signals.tape.hawkes]
alpha = 1.0
half_life_sec = 2.0

[signals.level]
lookback_min = 60
min_reversal_bps = 15
cluster_tolerance_bps = 10
touches_min = 2
level_min_age_sec = 300
cluster_snapshot_timeframes = ["M15", "H1"]
cluster_min_volume_pct = 0.05
approach_trigger_bps = 10
rejection_distance_bps = 20
break_distance_bps = 25
break_min_volume_usd = 30000.0
cluster_kde_smoothness = 1.0

[signals.level_bridge]
enabled = true
signal_level_subscribe = true
cleanup_interval_min = 60
max_server_levels = 50

[signals.approach]
impulse_min_distance_bps = 30
impulse_max_pullbacks = 1
impulse_min_speed = 0.8
slow_min_distance_bps = 30
slow_min_pullbacks = 3
slow_min_duration = 120
consolidation_range_bps = 10
pullback_min_bps = 5

[signals.leader]
leader_min_correlation = 0.6
leader_move_min_pct = 0.3
leader_lag_min_pct = 0.15
lag_max_age_ms = 3000

[strategies]
[strategies.common]
max_spread_bps = 3
max_vol_bps = 50
entry_timeout_sec = 10
move_stop_to_breakeven_after_tp1 = true

[strategies.bounce]
tp1_size_ratio = 0.5
no_progress_timeout_sec = 120
entry_offset_bps = 3
stop_buffer_bps = 5
stop_anchor_max_bps = 15
affinity_threshold = 0.6
affinity_stable_min = 5
# Post-entry invalidation (STRATEGIES.md § 1.7)
burst_contra_exit_sec = 5       # TapeBurst contra → close within this window after entry

[strategies.breakout]
max_avg_spread_bps = 4.0
tp1_r = 1.5                         # target R multiple; strategy pre-filters rounded TP1 below 1R
tp1_size_ratio = 0.5
no_progress_timeout_sec = 60
aggressive_offset_bps = 2
stop_buffer_bps = 5                 # stop behind support density/iceberg
support_search_range_bps = 20.0     # range for support density/iceberg behind breakout
min_distance_from_best_bps = 2.0    # WeakBreakoutTooCloseToBest threshold
min_leader_correlation = 0.6        # correlation at/above this makes non-neutral contra leader a hard reject
leader_neutral_max_pct = 0.10       # abs(leader_change_5s) <= this is neutral and allowed
leader_pre_entry_contra_pct = 0.10  # percentage threshold: abs(LeaderMove.lag_pct) for WeakBreakoutLeaderContra
min_tape_aggression = 0.3           # WeakBreakoutTapeAggressionLow threshold
min_relative_volume = 1.5           # WeakBreakoutLowParticipation threshold (5s vs 30s/6)
max_resistance_cluster_ratio = 0.7  # WeakBreakoutContraResistanceCluster threshold
post_entry_grace_sec = 5
min_follow_through_bps = 10
affinity_threshold = 0.55
affinity_stable_min = 5
# Post-entry invalidation (STRATEGIES.md § 2.7)
fade_contra_exit_sec = 5         # TapeFade on our side → close within this window after entry
leader_contra_exit_sec = 5       # LeaderMove contra → close within this window after entry
leader_exit_contra_pct = 0.15    # |lag_pct| threshold for leader contra exit

[strategies.breakout.tiers]
min_tape_aggression = [0.35, 0.20, 0.12]
min_distance_from_best_bps = [8.0, 5.0, 3.0]
support_search_range_bps = [40.0, 30.0, 20.0]

[strategies.leaderlag]
min_correlation = 0.6             # hard gate: no LeaderLag without rolling correlation
max_spread_bps = 3.0              # hard gate: spread must stay tight
lag_max_age_ms = 3000             # hard gate: stale LeaderMove is rejected
max_our_change_2s_pct = 0.1       # hard gate: follower has not already caught up
density_on_path_search_bps = 25.0 # hard gate: no large density blocking catch-up path
tp1_size_ratio = 0.6
no_progress_timeout_sec = 15
stop_distance_bps = 8
affinity_threshold = 0.5
affinity_stable_min = 5
# Post-entry invalidation (STRATEGIES.md § 3.7)
correlation_exit_threshold = 0.3   # exit if correlation drops below this
leader_exit_reversal_bps = 5.0     # exit if leader reverses more than this
swing_lookback_ticks = 30          # ticks for local extremum stop placement

[strategies.flushreversal]
# FN-004 status: gated paper/offline prototype. Safe default is non-live.
# Plain TapeFlush/repeated TapeFlush does NOT satisfy live-grade liquidation gates.
# Live requires T5 LiquidationFlush + open-interest/history confirmations and tests;
# allow_live=true alone must not be treated as production approval. Until T5
# implements these gates, live_gates_implemented remains false. FN-004 runtime
# rejects live FlushReversal plans unconditionally until those evidence checks exist.
allow_live = false
live_gates_implemented = false
require_liquidation_flush = true
require_open_interest_confirmation = true
tp1_size_ratio = 0.7
tp1_r = 2.0
no_progress_timeout_sec = 90
entry_timeout_sec = 8
entry_offset_bps = 2
stop_buffer_bps = 8
max_spread_bps = 4
min_flush_dist_bps = 3
min_flush_count = 2
flush_window_sec = 120
max_vol_fade_ratio = 0.5
min_price_reversal_bps = 1.5
min_level_touches = 2
affinity_threshold = 0.4
affinity_stable_min = 5

[universe]
[universe.pool]
allow_patterns         = ["*USDT"]
deny_patterns          = ["*UP*", "*DOWN*", "*BULL*", "*BEAR*", "*1000*"]
max_pool_size          = 30
# Coins are selected SOLELY by the MetaScalp screener.
# Exchange volume multiplier is auto-detected: MEXC → 0.1x, Bybit → 0.5x.
# Set exchange_volume_multiplier to override auto-detection.
min_volume_24h_usd      = 100000000.0
max_avg_spread_bps      = 3.0
# exchange_volume_multiplier = 1.0   # uncomment to override auto-detection

[universe.dynamic_thresholds]
# Per-coin dynamic threshold scaling for signal detectors.
# When enabled, min_size_usd / min_volume_usd thresholds are scaled
# proportionally to each coin's 24h volume relative to the reference.
enabled = true
reference_volume_24h_usd = 500000000
min_scale_factor = 0.15
max_scale_factor = 5.0
floor_ratio = 0.10

[universe.affinity]
# Settings for TickerUniverse
affinity_stable_min = 5
require_7d_history = false

[universe.affinity.bounce]
min_volume_24h_usd = 100000000.0
max_avg_spread_bps = 3.0
require_low_news_density = true
min_density_events_per_hour = 4
min_levels_in_60min = 3
min_bounce_success_rate_7d = 0.40

[universe.affinity.breakout]
min_volume_24h_usd = 100000000.0
max_avg_spread_bps = 4.0
min_volatility_1min_bps = 8.0
min_density_events_per_hour = 3
min_eating_events_per_hour = 1
min_follow_through_rate_7d = 0.35
min_breakout_events_per_day = 5

[universe.affinity.leaderlag]
require_leader = "BTC_USDT"
exclude_self_for_leader = true
min_correlation_60s = 0.6
min_volume_24h_usd = 50000000.0
max_avg_spread_bps = 3.0
min_leader_lag_events_per_hour = 2
avg_catchup_completion_rate_7d = 0.50
leader_lag_consistency_7d = 0.40

[universe.affinity.flushreversal]
min_volume_24h_usd = 50000000.0
max_avg_spread_bps = 6.0
max_funding_rate_bps = 4.0
min_flush_events_per_day = 3
flush_return_rate_7d = 0.60
liquidation_availability = true

[notifications]
subscribe = true
exchange_id = 0
market_type = 0
forward_big_tick_to_universe = true
forward_big_amount_to_signals = false

# T4-DASHBOARD / T4-METRICS — operator-facing HTTP endpoints
# Default: loopback-only. To expose on the network, set bind_address AND
# auth_token; the server logs WARN if a public bind is used without a token.
[dashboard]
bind_address  = "127.0.0.1"
port          = 8080
auth_token    = ""        # set to a long random string to enable LAN exposure

[metrics]
bind_address  = "127.0.0.1"
port          = 9090
