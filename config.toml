# Trade Bot Configuration Example
# This file contains all configuration parameters with their defaults as described in:
# - spec/SIGNAL_DETECTION.md
# - spec/STRATEGIES.md
# - spec/RISK_MANAGEMENT.md

[app]
version = "0.0.1"
name = "trade_bot_hardcore"

[logger]
level = "trace" # trace, debug, info, warn, error, critical
path = "logs/trade_bot.log"

[network]
http_timeout_ms = 5000
ws_reconnect_delay_ms = 1000
ws_max_reconnect_delay_ms = 30000
metascalp_max_rps = 20

[trading]
symbols = ["BTC_USDT", "ETH_USDT", "SOL_USDT"]
max_concurrent_orders = 5

[risk]
# R2: Daily limit (morj)
max_daily_loss_pct = 3.0
# R8: sizing
max_per_trade_risk_pct = 0.5
# R14: hard kill
max_single_position_loss_pct = 1.5
# R15: slippage control
max_entry_slippage_bps = 5
# R8: clip on volume
max_position_value_pct = 10.0
# R3: parallel trades
max_concurrent_positions = 3
max_positions_per_ticker = 1
# R9: leverage
max_leverage = 5.0
margin_safety_ratio = 0.8
# R6: Stop validation
min_stop_bps = 3
warn_stop_bps = 15
max_stop_bps = 20
# R7: TP validation
min_rr_ratio = 1.0
min_tp2_rr = 2.0
# R10: anti-tilt
max_trades_per_window = 6
trades_window_min = 5
# R11: loss-streak
max_consecutive_losses = 3
loss_streak_window_min = 15
loss_streak_cooloff_min = 10
# R12: news blackout
news_blackout_min = 5
news_calendar_check_min = 60
news_calendar_require_fresh = false
# R13: funding blackout
funding_blackout_pre_sec = 30
funding_blackout_post_sec = 30
# Other
allow_hedge = false
whitelist_tickers = []
exchange_error_streak = 5
ws_reconnect_timeout_sec = 15
ws_loss_poll_interval_ms = 500
position_drift_coin = 0.0001
kill_switch_close_positions = true
kill_switch_close_timeout_sec = 30
kill_switch_step_timeout_sec = 5
kill_switch_total_timeout_sec = 45
max_parallel_cancel = 5
ws_loss_soft_stop_bps = 25
connection_health_poll_sec = 30
finres_staleness_sec = 60
finres_staleness_kill_sec = 300
finres_kill_on_staleness = false

[clock]
# NTP sources for ClockDriftMonitor. First-responder wins (failover).
sources = ["pool.ntp.org", "time.google.com"]
check_interval_sec = 30
query_timeout_ms = 1500
warn_drift_ms = 1000
# WSL note: WSL clocks consistently lag Windows host by ~2 s.
# 5000 ms prevents false kills while still catching genuine clock jumps.
max_clock_drift_ms = 5000


[external_feeds]
[external_feeds.funding]
staleness_warn_sec = 120
staleness_kill_sec = 900
kill_on_staleness = false

[signals]
[signals.density]
min_size_vs_avg = 10.0
min_size_usd = 50000.0
min_distance_bps = 5
max_distance_bps = 150
sticky_duration_ms = 2000
fake_threshold_ms = 300
sticky_min_trade_ms = 5000
eating_window_ms = 3000
eating_ratio_threshold = 0.4
eating_min_prints = 5
eating_cooloff_ms = 1000

[signals.iceberg]
evidence_count_min = 3
evidence_window_sec = 30
iceberg_min_size_usd = 100000.0
size_retention_ratio = 0.5
iceberg_posterior_threshold = 0.8
event_join_window_ms = 100

[signals.tape]
burst_ratio = 3.0
burst_min_volume_usd = 50000.0
burst_min_rate = 5.0
fade_ratio = 0.2
fade_min_peak_rate = 10.0
fade_max_delay = 30.0
fade_cusum_h = 5.0
flush_min_size_usd = 200000.0
flush_min_move_bps = 15
back_window_sec = 10
distribution_max_range_bps = 20
distribution_min_volume_usd = 500000.0
distribution_min_spread_bps = 2.0

[signals.tape.hawkes]
alpha = 1.0
half_life_sec = 2.0

[signals.level]
lookback_min = 60
min_reversal_bps = 15
cluster_tolerance_bps = 10
touches_min = 2
level_min_age_sec = 300
cluster_snapshot_timeframes = ["M15", "H1"]
cluster_min_volume_pct = 0.05
approach_trigger_bps = 10
rejection_distance_bps = 20
break_distance_bps = 25
break_min_volume_usd = 30000.0
cluster_kde_smoothness = 1.0

[signals.approach]
impulse_min_distance_bps = 30
impulse_max_pullbacks = 1
impulse_min_speed = 0.8
slow_min_distance_bps = 30
slow_min_pullbacks = 3
slow_min_duration = 120
consolidation_range_bps = 10
pullback_min_bps = 5

[signals.leader]
leader_min_correlation = 0.6
leader_move_min_pct = 0.10
leader_lag_min_pct = 0.05
lag_max_age_ms = 3000

[strategies]
[strategies.common]
max_spread_bps = 3
max_vol_bps = 50
entry_timeout_sec = 10
move_stop_to_breakeven_after_tp1 = true

[strategies.bounce]
tp1_size_ratio = 0.5
no_progress_timeout_sec = 120
entry_offset_bps = 3
stop_buffer_bps = 5
stop_anchor_max_bps = 15
affinity_threshold = 0.6
affinity_stable_min = 5
# Post-entry invalidation (STRATEGIES.md § 1.7)
burst_contra_exit_sec = 5       # TapeBurst contra → close within this window after entry

# S4-FIX: Missing parameters (15 added)
min_approach_speed_bps_1s = 15.0      # C2: impulse approach speed
max_tape_speed_ratio = 1.5            # C4: stalling check (vol_1s / avg_vol_1s)
min_relative_density = 0.15           # C3: density size vs book depth
tp1_r = 2.0                           # TP1 = entry + 2R
min_driver_reversal_bps = 20.0        # S1-FIX: C5 leader alignment (was dead at 2 bps)
max_level_age_sec = 300               # C1: level freshness (5 min)
min_density_age_ms = 2000             # C3b: density maturity (2 sec)
require_tape_fade = true              # C4-explicit: require TapeFade signal
tape_fade_max_age_sec = 5             # C4-explicit: TapeFade age limit
leader_contra_lookback_sec = 5        # C6-explicit: LeaderMove lookback
leader_contra_max_pct = 0.3           # C6-explicit: max leader contra move (0.3%)
max_funding_against_bps = 15.0        # C-Funding: max funding rate against position
max_mark_mid_bps = 10.0               # C-MarkMid: max mark/mid divergence
density_cluster_enabled = true        # §5.6: scan for density clusters
density_cluster_max_bps = 20.0        # §5.6: cluster range
max_level_touches_for_bounce = 2      # §0.8: N-th approach filter (3rd+ = breakout only)

# Tier-based thresholds (adaptive per coin volume)
# Format: [tier0_value, tier1_value, tier2_value]
# Tier 0: >$1B (BTC, ETH) — stricter thresholds
# Tier 1: $100M-$1B (SOL, AVAX) — baseline thresholds
# Tier 2: <$100M (small caps) — relaxed thresholds
[strategies.bounce.tiers]
min_approach_speed_bps_1s = [50.0, 15.0, 8.0]
min_relative_density = [0.25, 0.15, 0.10]
min_driver_reversal_bps = [30.0, 20.0, 12.0]

[strategies.breakout]
tp1_size_ratio = 0.5
no_progress_timeout_sec = 60
aggressive_offset_bps = 2
post_entry_grace_sec = 5
min_follow_through_bps = 10
affinity_threshold = 0.55
affinity_stable_min = 5
min_tape_aggression = 0.2
min_relative_volume = 1.2
max_resistance_cluster_ratio = 0.8
# Post-entry invalidation (STRATEGIES.md § 2.7)
fade_contra_exit_sec = 5         # TapeFade on our side → close within this window after entry
leader_contra_exit_sec = 5       # LeaderMove contra → close within this window after entry
leader_exit_contra_pct = 0.15    # |lag_pct| threshold for leader contra exit

# S4-FIX: Missing parameters (6 added)
max_avg_spread_bps = 4.0         # Spread gate
stop_buffer_bps = 8.0            # Stop buffer beyond support
tp1_r = 2.5                      # TP1 = entry + 2.5R
min_leader_correlation = 0.6     # C4: leader alignment threshold
support_search_range_bps = 30.0  # C3: support search range
min_distance_from_best_bps = 5.0 # C5: min distance from best price (§2.4)

# Tier-based thresholds
[strategies.breakout.tiers]
min_tape_aggression = [0.35, 0.20, 0.12]
min_distance_from_best_bps = [8.0, 5.0, 3.0]
support_search_range_bps = [40.0, 30.0, 20.0]

[strategies.leaderlag]
tp1_size_ratio = 0.6
no_progress_timeout_sec = 15
stop_distance_bps = 8
affinity_threshold = 0.5
affinity_stable_min = 5
# Post-entry invalidation (STRATEGIES.md § 3.7)
correlation_exit_threshold = 0.3   # exit if correlation drops below this
leader_exit_reversal_bps = 5.0     # exit if leader reverses more than this
swing_lookback_ticks = 30          # ticks for local extremum stop placement

# S4-FIX: Missing parameters (8 added)
min_correlation = 0.6              # C3: rolling correlation threshold
max_our_change_2s_pct = 0.1        # C4: max our movement (0.1%)
density_on_path_search_bps = 30.0  # C5: density search range
max_spread_bps = 3.0               # C6: spread gate
lag_max_age_ms = 3000              # C2: signal age limit (3 sec)
entry_timeout_sec = 10             # Plan TTL
tp1_catchup_ratio = 0.8            # TP1 = expected_catchup * 0.8

# Tier-based thresholds
[strategies.leaderlag.tiers]
max_our_change_2s_pct = [0.05, 0.1, 0.15]  # Stricter for BTC, relaxed for small caps
density_on_path_search_bps = [40.0, 30.0, 20.0]
stop_distance_bps = [12.0, 8.0, 6.0]

[strategies.flush]
tp1_size_ratio = 0.7
no_progress_timeout_sec = 90
flush_window_sec = 120
affinity_threshold = 0.4
affinity_stable_min = 5

# S4-FIX: Missing parameters (10 added)
max_spread_bps = 6.0               # C1: spread gate
flush_max_age_sec = 10             # C2: LevelBreak age limit
min_flush_dist_bps = 15.0          # C2: min flush distance
min_level_touches = 3              # C3: level strength
tape_flush_max_age_sec = 5         # C4: TapeFlush age limit
min_flush_count = 1                # C4: min flush count (GAP-09)
flush_count_window_sec = 30        # C4: flush count window
max_vol_fade_ratio = 0.6           # C5: volume fade threshold
min_price_reversal_bps = 5.0       # C6: reversal confirmation
entry_offset_bps = 3.0             # Entry offset from level
stop_buffer_bps = 8.0              # Stop buffer beyond level
tp1_r = 2.0                        # TP1 = entry + 2R
entry_timeout_sec = 10             # Plan TTL
post_entry_grace_sec = 5           # Grace period before follow-through check
min_follow_through_bps = 8.0       # Min follow-through after grace

# Tier-based thresholds
[strategies.flush.tiers]
min_flush_dist_bps = [25.0, 15.0, 10.0]
min_price_reversal_bps = [8.0, 5.0, 3.0]
entry_offset_bps = [5.0, 3.0, 2.0]

[universe]
# Tier-based threshold scaling (Phase 0-4)
tier_thresholds_enabled = true
tier_volume_boundaries = [1000000000.0, 100000000.0, 0.0]  # [$1B, $100M, $0]

[universe.pool]
allow_patterns         = ["*USDT"]
deny_patterns          = ["*UP*", "*DOWN*", "*BULL*", "*BEAR*", "*1000*"]
require_trading_allowed = true
max_pool_size          = 30
pool_refresh_min       = 30

# Dynamic pool filter (active once warmup stats are collected).
# Coins are selected SOLELY by the MetaScalp screener (ScreenerNewCoin).
# No manual_allow — the screener is the single source of truth.
# Exchange volume multiplier is auto-detected from connection name:
#   MEXC → 0.1x, Bybit → 0.5x, Binance/other → 1.0x
# Set exchange_volume_multiplier to override auto-detection.
#   e.g., exchange_volume_multiplier = 0.08 for a very-low-volume exchange.
exclude_top_n_by_volume = 10
min_volume_24h_usd      = 10000000   # 10M (before exchange multiplier)
max_avg_spread_bps      = 15
warmup_sec              = 600
# exchange_volume_multiplier = 1.0   # uncomment to override auto-detection

[universe.dynamic_thresholds]
# Per-coin dynamic threshold scaling for signal detectors.
# When enabled, min_size_usd / min_volume_usd thresholds are scaled
# proportionally to each coin's 24h volume relative to the reference.
#   BTC ($30B vol) → thresholds scaled UP (~1.5-5x)
#   TON ($100M vol) → thresholds scaled DOWN (~0.15-0.5x)
# Uses sqrt compression to keep extremes from dominating.
enabled = true
reference_volume_24h_usd = 500000000   # 500M USD — "standard" coin reference
min_scale_factor = 0.15               # floor (15% of config default)
max_scale_factor = 5.0                # ceiling (500% of config default)
floor_ratio = 0.10                    # absolute floor: calibrated threshold ≥ 10% of config default

[universe.affinity]
# Settings for TickerUniverse
affinity_stable_min = 5
require_7d_history = false

[universe.affinity.bounce]
min_volume_24h_usd = 50000000.0      # S6-FIX: 100M→50M (more coins)
max_avg_spread_bps = 3.0
require_low_news_density = true
min_density_events_per_hour = 4
min_levels_in_60min = 2              # S6-FIX: 3→2 (more realistic)
min_bounce_success_rate_7d = 0.25    # S6-FIX: 0.40→0.25 (more realistic)

[universe.affinity.breakout]
min_volume_24h_usd = 100000000.0
max_avg_spread_bps = 4.0
min_volatility_1min_bps = 8.0
min_density_events_per_hour = 3
min_eating_events_per_hour = 1
min_breakout_events_per_day = 5

[universe.affinity.leaderlag]
require_leader = "BTCUSDT"
exclude_self_for_leader = true
min_correlation_60s = 0.4            # S6-FIX: 0.6→0.4 (more realistic for alts)
min_volume_24h_usd = 50000000.0
max_avg_spread_bps = 3.0
min_leader_lag_events_per_hour = 2
avg_catchup_completion_rate_7d = 0.30  # S6-FIX: 0.50→0.30 (more realistic)
leader_lag_consistency_7d = 0.40

[universe.affinity.flush]
min_volume_24h_usd = 50000000.0
max_avg_spread_bps = 6.0
min_flush_events_per_day = 3
flush_return_rate_7d = 0.60
liquidation_availability = true

[dashboard]
bind_address  = "127.0.0.1"
port          = 8080
auth_token    = ""        # set to a long random string to enable LAN exposure

[metrics]
bind_address  = "127.0.0.1"
port          = 9090
